<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<link rel="stylesheet" href="style.css">

<style>

.status-row{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
margin-bottom:10px;
background:#1e293b;
padding:10px;
border-radius:10px;
}

.status-row select{
max-width:220px;
margin:0;
}

.player-result{
background:#1e293b;
padding:15px;
margin-bottom:15px;
border-radius:12px;
}

#drawButton:disabled{
opacity:.6;
cursor:not-allowed;
}

#saveStatus{
display:inline-block;
margin-left:10px;
font-size:0.9em;
color:#86efac;
}

</style>

</head>

<body>

<div class="hero">

<h1>🔒 Admin Dashboard</h1>

<p>Tournament Director Controls</p>

<div class="admin-section">

<h2>👨‍👩‍👧‍👦 Participants</h2>

<p>Enter one participant per line</p>

<textarea
id="participants"
rows="10"
placeholder="Mike&#10;Sarah&#10;Tom">
</textarea>

<button
id="drawButton"
onclick="generateTournamentDraw()">
🎲 Generate Draw
</button>

</div>

<div class="admin-section">

<h2>📢 Tournament Message</h2>

<textarea
id="tournamentMessage"
rows="4"
placeholder="Tournament update...">
</textarea>

<button onclick="saveMessage()">
💾 Save Message
</button>

</div>

<div class="admin-section">

<h2>🏆 Generated Draw</h2>

<div id="drawOutput">
No draw generated yet.
</div>

</div>

<div class="admin-section">

<h2>⚽ Team Status Manager</h2>

<div id="statusManager">
Loading teams...
</div>

</div>

<div class="admin-section">

<h2>💾 Tournament Controls</h2>

<button onclick="saveTournament()">
💾 Save Tournament
</button>
<span id="saveStatus"></span>

<br><br>

<button onclick="unlockDraw()">
🔓 Unlock Draw
</button>

<button onclick="downloadDataFile()">
📥 Download data.json
</button>

</div>

<br>

<a href="index.html">← Home</a>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBmVb4vdoCJQg5uFC-yGogjKZzIsdhWZRY",
  authDomain: "world-cup-sweepstake-202-d2993.firebaseapp.com",
  projectId: "world-cup-sweepstake-202-d2993",
  storageBucket: "world-cup-sweepstake-202-d2993.firebasestorage.app",
  messagingSenderId: "417434337725",
  appId: "1:417434337725:web:7728561dc86974fee152d4",
  measurementId: "G-1YZKQ5ZT64"
};

const firebaseApp = initializeApp(firebaseConfig);
const db = getFirestore(firebaseApp);

let tournamentData = null;

// ----------------------
// Load Data
// ----------------------

async function loadData() {

    try {

        const docRef = doc(db, "tournament", "data");
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
            tournamentData = docSnap.data();
            return tournamentData;
        }

    } catch (error) {
        console.log("Firebase unavailable, falling back to data.json", error);
    }

    const response = await fetch("data.json");
    tournamentData = await response.json();
    return tournamentData;

}

// ----------------------
// Save to Firebase
// ----------------------

async function saveToFirebase() {

    if (!tournamentData) return;

    const docRef = doc(db, "tournament", "data");
    await setDoc(docRef, tournamentData);

}

// ----------------------
// Helper functions
// ----------------------

function getStatusScore(status) {
    switch(status){
        case "🏆 Champion":      return 100;
        case "⭐ Finalist":      return 90;
        case "🟣 Semi Final":    return 80;
        case "🔵 Quarter Final": return 70;
        case "🟠 Last 16":       return 60;
        case "🟡 Last 32":       return 50;
        case "🟢 Active":        return 40;
        default:                 return 0;
    }
}

function shuffle(array){
    for(let i=array.length-1; i>0; i--){
        const j = Math.floor(Math.random() * (i+1));
        [array[i],array[j]] = [array[j],array[i]];
    }
    return array;
}

function generateDraw(players, teams){

    players.forEach(player=>{ player.teams = []; });

    const pot1 = ["Argentina","France","Brazil","Spain","England","Portugal","Germany","Netherlands","Belgium","Croatia","Uruguay","Morocco"];
    const pot2 = ["United States","Mexico","Japan","Switzerland","Colombia","Senegal","South Korea","Ecuador","Norway","Sweden","Paraguay","Türkiye"];
    const pot3 = ["Canada","Austria","Ghana","Egypt","Algeria","Tunisia","Ivory Coast","Panama","Scotland","Australia","Qatar","Saudi Arabia"];
    const pot4 = ["Bosnia and Herzegovina","Cape Verde","Curaçao","Czechia","DR Congo","Haiti","Iran","Iraq","Jordan","New Zealand","South Africa","Uzbekistan"];

    const pots = [pot1, pot2, pot3, pot4];

    pots.forEach(pot=>{

        const potTeams = shuffle(teams.filter(team => pot.includes(team.name)));

        for(let i=0; i<players.length; i++){
            if(i < potTeams.length){
                players[i].teams.push(potTeams[i]);
            }
        }

        const leftovers = potTeams.slice(players.length);
        leftovers.forEach(team=>{
            const randomPlayer = players[Math.floor(Math.random() * players.length)];
            randomPlayer.teams.push(team);
        });

    });

    return players;

}

// ----------------------
// Page Init
// ----------------------

loadData().then(data => {

    document.getElementById("tournamentMessage").value =
        data.tournamentMessage || "";

    buildStatusManager(data);

    if(data.drawLocked){
        const button = document.getElementById("drawButton");
        button.innerHTML = "🔒 Draw Locked";
        button.disabled = true;
    }

    if(data.players && data.players.length > 0){
        renderDraw(data.players);
    }

});

// ----------------------
// Generate Draw
// ----------------------

window.generateTournamentDraw = async function(){

    const data = await loadData();

    const names = document.getElementById("participants")
        .value.split("\n").map(n=>n.trim()).filter(n=>n);

    if(names.length < 2){
        alert("Please enter at least 2 participants");
        return;
    }

    const players = names.map(name=>({ name, photo:"", teams:[] }));
    const teams = data.teams.map(team=>({
        name:team.name, flag:team.flag, group:team.group, status:"🟢 Active"
    }));

    generateDraw(players, teams);

    tournamentData = data;
    tournamentData.players = players;
    tournamentData.drawLocked = true;

    renderDraw(players);

    document.getElementById("drawButton").innerHTML = "🔒 Draw Locked";
    document.getElementById("drawButton").disabled = true;

    alert("Official draw generated and locked!");

}

// ----------------------
// Render Draw
// ----------------------

function renderDraw(players){

    let html = "";

    players.forEach(player=>{

        html += `<div class="player-result"><h3>${player.name}</h3>`;

        player.teams.forEach(team=>{
            html += `<div>${team.flag} ${team.name} (Group ${team.group})</div>`;
        });

        html += `</div>`;

    });

    document.getElementById("drawOutput").innerHTML = html;

}

// ----------------------
// Save Message
// ----------------------

window.saveMessage = async function(){

    if(!tournamentData){
        alert("Load data first");
        return;
    }

    tournamentData.tournamentMessage =
        document.getElementById("tournamentMessage").value;

    await saveToFirebase();
    showSaveStatus("✅ Message saved!");

}

// ----------------------
// Build Status Manager
// ----------------------

function buildStatusManager(data){

    let html = "";

    data.teams.forEach(team=>{

        const currentStatus = getTeamStatus(team.name) || "🟢 Active";

        html += `
        <div class="status-row">
            <div>${team.flag} ${team.name} (Group ${team.group})</div>
            <select id="status-${team.name}">
                ${data.statuses.map(status=>`
                    <option value="${status}" ${status === currentStatus ? "selected" : ""}>
                        ${status}
                    </option>
                `).join("")}
            </select>
        </div>`;

    });

    document.getElementById("statusManager").innerHTML = html;

}

function getTeamStatus(teamName){

    if(!tournamentData || !tournamentData.players) return null;

    for(const player of tournamentData.players){
        const team = player.teams.find(t => t.name === teamName);
        if(team) return team.status;
    }

    return null;

}

// ----------------------
// Save Tournament
// ----------------------

window.saveTournament = async function(){

    if(!tournamentData){
        alert("Load data first");
        return;
    }

    tournamentData.tournamentMessage =
        document.getElementById("tournamentMessage").value;

    const statusMap = {};

    tournamentData.teams.forEach(team=>{
        const select = document.getElementById(`status-${team.name}`);
        if(select){ statusMap[team.name] = select.value; }
    });

    tournamentData.players.forEach(player=>{
        player.teams.forEach(team=>{
            if(statusMap[team.name]){
                team.status = statusMap[team.name];
            }
        });
    });

    await saveToFirebase();
    showSaveStatus("✅ Saved! All users will see updates instantly.");

}

// ----------------------
// Unlock Draw
// ----------------------

window.unlockDraw = async function(){

    if(!confirm("Unlock draw and allow a redraw?")) return;

    tournamentData.drawLocked = false;

    await saveToFirebase();

    const button = document.getElementById("drawButton");
    button.disabled = false;
    button.innerHTML = "🎲 Generate Draw";

    alert("Draw unlocked successfully");

}

// ----------------------
// Download data.json
// ----------------------

window.downloadDataFile = function(){

    if(!tournamentData){
        alert("Load data first");
        return;
    }

    const json = JSON.stringify(tournamentData, null, 2);
    const blob = new Blob([json], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "data.json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

}

// ----------------------
// Save Status Indicator
// ----------------------

function showSaveStatus(message){

    const el = document.getElementById("saveStatus");
    el.innerText = message;
    setTimeout(()=>{ el.innerText = ""; }, 3000);

}

</script>

</body>

</html>
