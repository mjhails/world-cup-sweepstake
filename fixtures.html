    return await response.json();

        });
    });

    let html = "";

        html += `<div class="admin-section"><h2>📅 ${day.date}</h2>`;

            const away = match[1];
            const time = match[2];

            const homeOwner = teamOwner[home] || "-";
            const awayOwner = teamOwner[away] || "-";

            html += `
            <div class="team-card">
                <h3>${time} UK Time</h3>
                <p>⚽ ${home}<br>👤 ${homeOwner}</p>
                <p>vs</p>
                <p>⚽ ${away}<br>👤 ${awayOwner}</p>
            </div>`;

        html += `</div><br>`;
