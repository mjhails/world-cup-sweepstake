<style>

.fixture-card {
    background: #1e293b;
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 10px;
}

.fixture-time {
    font-size: 0.8em;
    color: #94a3b8;
    margin-bottom: 8px;
    text-align: center;
}

.fixture-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    width: 100%;
}

.fixture-team {
    flex: 1;
    min-width: 0;
}

.fixture-team.home {
    text-align: right;
}

.fixture-team.away {
    text-align: left;
}

.fixture-team-name {
    font-weight: bold;
    font-size: 0.95em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.fixture-team-owner {
    font-size: 0.75em;
    color: #94a3b8;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.fixture-score {
    flex: 0 0 auto;
    text-align: center;
    min-width: 70px;
}

.fixture-score-number {
    font-size: 1.5em;
    font-weight: bold;
    white-space: nowrap;
    line-height: 1.2;
}

.fixture-score-result {
    font-size: 0.7em;
    color: #86efac;
    white-space: nowrap;
}

.fixture-score-pending {
    font-size: 0.85em;
    color: #475569;
    white-space: nowrap;
}

@media (max-width: 480px) {
    .fixture-team-name {
        font-size: 0.82em;
    }
    .fixture-score-number {
        font-size: 1.2em;
    }
    .fixture-score {
        min-width: 55px;
    }
}

</style>
</head>

    try {
        const docRef = doc(db, "tournament", "data");
        const docSnap = await getDoc(docRef);
        if (docSnap.exists()) return docSnap.data();
    } catch(e) {
        console.log("Firebase unavailable, falling back to data.json");

    const response = await fetch("data.json");
    return await response.json();
}

function matchKey(home, away, time, date){
    return `${home}_vs_${away}_${time}_${date}`;
}

// ----------------------
// Knockout Stage Fixtures
// ----------------------

const KNOCKOUT_FIXTURES = [
    { round:"Round of 32", date:"Sunday 28 June 2026", time:"20:00", teamA:"South Africa", teamB:"Canada", key:"R32_M73" },
    { round:"Round of 32", date:"Monday 29 June 2026", time:"18:00", teamA:"Brazil", teamB:"Japan", key:"R32_M76" },
    { round:"Round of 32", date:"Monday 29 June 2026", time:"21:30", teamA:"Germany", teamB:"Paraguay", key:"R32_M74" },

    { round:"Round of 32", date:"Friday 3 July 2026", time:"19:00", teamA:"Australia", teamB:"Egypt", key:"R32_M88" },
    { round:"Round of 32", date:"Friday 3 July 2026", time:"23:00", teamA:"Argentina", teamB:"Cape Verde", key:"R32_M86" },
    { round:"Round of 32", date:"Saturday 4 July 2026", time:"02:30", teamA:"Colombia", teamB:"Ghana", key:"R32_M87" }
];

function renderKnockout(knockoutData, teamOwner){

    let html = `<div class="admin-section"><h2>🏆 Knockout Stage</h2>`;
    let currentDate = "";

    KNOCKOUT_FIXTURES.forEach(match => {

        if(match.date !== currentDate){
            html += `<h3 style="margin-top:15px;font-size:1em;color:#94a3b8;">📅 ${match.date} — ${match.round}</h3>`;
            currentDate = match.date;
        }

        const saved = knockoutData[match.key];
        const ownerA = teamOwner[match.teamA] || "-";
        const ownerB = teamOwner[match.teamB] || "-";

        let scoreHTML = "";

        if(saved && saved.scoreA !== null && saved.scoreA !== undefined){
            const winnerLabel = saved.winner ? `🏆 ${saved.winner} Advances` : "";
            scoreHTML = `
                <div class="fixture-score">
                    <div class="fixture-score-number">${saved.scoreA} - ${saved.scoreB}</div>
                    ${winnerLabel ? `<div class="fixture-score-result">${winnerLabel}</div>` : ""}
                </div>`;
        } else {
            scoreHTML = `
                <div class="fixture-score">
                    <div class="fixture-score-pending">vs</div>
                </div>`;
        }

        html += `
        <div class="fixture-card">
            <div class="fixture-time">⏰ ${match.time} UK Time</div>
            <div class="fixture-row">
                <div class="fixture-team home">
                    <div class="fixture-team-name">⚽ ${match.teamA}</div>
                    <div class="fixture-team-owner">👤 ${ownerA}</div>
                </div>
                ${scoreHTML}
                <div class="fixture-team away">
                    <div class="fixture-team-name">⚽ ${match.teamB}</div>
                    <div class="fixture-team-owner">👤 ${ownerB}</div>
                </div>
            </div>
        </div>`;

    });

    html += `</div><br>`;

    document.getElementById("knockout").innerHTML = html;
}

loadData().then(data => {

    const teamOwner = {};
    const firebaseScores = data.scores || {};

    data.players.forEach(player => {
        player.teams.forEach(team => {
            teamOwner[team.name] = player.name;
        });
    });

    renderKnockout(data.knockout || {}, teamOwner);

    let html = "";

    fixtures.forEach(day => {

        html += `<div class="admin-section"><h2>📅 ${day.date}</h2>`;

        day.matches.forEach(match => {

            const home   = match[0];
            const away   = match[1];
            const time   = match[2];
            const date   = match[3];
            const key    = matchKey(home, away, time, date);

            // Use hardcoded past result first, then Firebase score
            const score  = hardcodedScores[key] || firebaseScores[key];

            const homeOwner = teamOwner[home] || "-";
            const awayOwner = teamOwner[away] || "-";

            let scoreHTML = "";

            if(score && (score.homeScore !== null && score.homeScore !== undefined)){
                const resultLabel =
                    score.result === "home" ? `🏆 ${home} Win` :
                    score.result === "away" ? `🏆 ${away} Win` :
                    score.result === "draw" ? "🤝 Draw" : "";

                scoreHTML = `
                    <div class="fixture-score">
                        <div class="fixture-score-number">${score.homeScore} - ${score.awayScore}</div>
                        ${resultLabel ? `<div class="fixture-score-result">${resultLabel}</div>` : ""}
                    </div>`;
            } else {
                scoreHTML = `
                    <div class="fixture-score">
                        <div class="fixture-score-pending">vs</div>
                    </div>`;
            }

            html += `
            <div class="fixture-card">
                <div class="fixture-time">⏰ ${time} UK Time</div>
                <div class="fixture-row">
                    <div class="fixture-team home">
                        <div class="fixture-team-name">⚽ ${home}</div>
                        <div class="fixture-team-owner">👤 ${homeOwner}</div>
                    </div>
                    ${scoreHTML}
                    <div class="fixture-team away">
                        <div class="fixture-team-name">⚽ ${away}</div>
                        <div class="fixture-team-owner">👤 ${awayOwner}</div>
                    </div>
                </div>
            </div>`;

        });

        html += `</div><br>`;

    });

    document.getElementById("fixtures").innerHTML = html;

});

</script>
