<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tournament Standings</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="hero">

<h1>🏆 Tournament Standings</h1>

<p>
Live leaderboard based on team progress
</p>

<div id="podium"></div>

<br><br>

<div id="fullTable"></div>

<br>

<a href="index.html">
← Home
</a>

</div>

<script src="app.js"></script>

<script>

loadData().then(data => {

loadLocalTournamentData();

if(tournamentData){
data = tournamentData;
}

const rankedPlayers =
rankPlayers(data.players);

buildPodium(rankedPlayers);

buildTable(rankedPlayers);

});

function getPlayerScore(player){

return player.teams.reduce((total,team)=>{

return total +
getStatusScore(team.status);

},0);

}

function getBestTeam(player){

let bestTeam = null;
let bestScore = -1;

player.teams.forEach(team=>{

const score =
getStatusScore(team.status);

if(score > bestScore){

bestScore = score;
bestTeam = team;

}

});

return bestTeam;

}

function buildPodium(players){

let html = `
<div class="podium">
`;

if(players[1]){

html += `
<div class="place second">

<h2>🥈 2nd</h2>

${getPlayerCard(players[1])}

</div>
`;

}

if(players[0]){

html += `
<div class="place first">

<h2>🥇 1st</h2>

${getPlayerCard(players[0])}

</div>
`;

}

if(players[2]){

html += `
<div class="place third">

<h2>🥉 3rd</h2>

${getPlayerCard(players[2])}

</div>
`;

}

html += `
</div>
`;

document.getElementById(
"podium"
).innerHTML = html;

}

function buildTable(players){

let html = "";

players.forEach((player,index)=>{

const photo =
getProfilePhoto(player.name);

const score =
getPlayerScore(player);

const bestTeam =
getBestTeam(player);

html += `

<div class="table-row">

<div style="display:flex;align-items:center;gap:10px;">

${photo
? `<img
src="${photo}"
style="
width:50px;
height:50px;
border-radius:50%;
object-fit:cover;
">`
: ""
}

<div>

<strong>
${index + 1}. ${player.name}
</strong>

<br>

Score:
${score}

<br>

Best Team:
${bestTeam
? `${bestTeam.flag} ${bestTeam.name}`
: "None"
}

</div>

</div>

</div>

`;

});

document.getElementById(
"fullTable"
).innerHTML = html;

}

function getPlayerCard(player){

const photo =
getProfilePhoto(player.name);

const score =
getPlayerScore(player);

const bestTeam =
getBestTeam(player);

return `

${photo
? `<img
src="${photo}"
class="profile-photo">`
: ""
}

<h3>
${player.name}
</h3>

<p>
Score: ${score}
</p>

<p>
${bestTeam
? `${bestTeam.flag} ${bestTeam.name}`
: ""
}
</p>

`;

}

</script>

</body>

</html>
